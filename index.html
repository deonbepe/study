<li><b>Key-pair:</b> for service accounts —
<pre>-- openssl genrsa -out key.pem 2048
-- openssl rsa -in key.pem -pubout -out pub.pem
ALTER USER svc SET RSA_PUBLIC_KEY='MIIBI...';</pre>
Private key stays with the app; only the public key is registered. No stored password.</li>
<li><b>Programmatic Access Tokens (PAT):</b> time-limited tokens for automation — newer password alternative.</li></ul>
<h3>8.2 Network policies</h3>
<pre>CREATE NETWORK POLICY office_only
  ALLOWED_IP_LIST = ('203.0.113.0/24')
  BLOCKED_IP_LIST = ('203.0.113.99');
ALTER ACCOUNT SET NETWORK_POLICY = office_only;
ALTER USER jdoe SET NETWORK_POLICY = office_only;</pre>
<p>Account-level applies to all users; a user-level policy OVERRIDES it for that user.</p>
<h3>8.3 Private connectivity</h3>
<p>AWS PrivateLink, Azure Private Link, GCP Private Service Connect — private endpoints in your VPC/VNet. All require Business Critical or higher.</p>
<h3>8.4 Account identifiers</h3>
<ul><li><b>Modern (preferred):</b> orgname-accountname, e.g. acmecorp-prod — portable across regions/clouds. URLs: https://orgname-accountname.snowflakecomputing.com</li><li><b>Legacy:</b> locator.region.cloud, e.g. xy12345.us-east-1.aws — still works for backward compatibility.</li></ul>`,

9: `
<h3>9.1 Dynamic Data Masking</h3>
<pre>CREATE MASKING POLICY mask_email
AS (val STRING) RETURNS STRING ->
  CASE WHEN CURRENT_ROLE() IN
    ('COMPLIANCE_ADMIN','ACCOUNTADMIN') THEN val
  ELSE REGEXP_REPLACE(val,'.+@','***@') END;

ALTER TABLE customers MODIFY COLUMN email
  SET MASKING POLICY mask_email;</pre>
<p>Decided at query time based on role/context — compliance sees real values, everyone else sees ***@domain.com.</p>
<h3>9.2 Row Access Policies</h3>
<pre>CREATE ROW ACCESS POLICY rap_region
AS (region STRING) RETURNS BOOLEAN ->
  CURRENT_ROLE()='ACCOUNTADMIN'
  OR EXISTS (SELECT 1 FROM region_access_map
     WHERE role_name=CURRENT_ROLE()
       AND allowed_region=region);
ALTER TABLE orders ADD ROW ACCESS POLICY rap_region ON (region);</pre>
<h3>9.3–9.4 Tags & tag-based masking</h3>
<pre>CREATE TAG sensitivity;
ALTER TABLE customers MODIFY COLUMN ssn
  SET TAG sensitivity='PII_HIGH';
ALTER TAG sensitivity SET MASKING POLICY mask_pii;</pre>
<p>Tags drive cost tracking, discovery, and centralized masking — tag a new column and it is masked automatically, no per-column ALTER.</p>
<h3>9.5 Data Classification</h3>
<pre>CALL SYSTEM$CLASSIFY('db.public.customers',
  {'auto_tag': true});</pre>
<p>AUTOMATED detection using semantic categories (EMAIL, PHONE, NAME, SSN…) and privacy categories (IDENTIFIER, QUASI_IDENTIFIER, SENSITIVE). Classification detects; tagging labels — together: classify finds sensitive columns, then auto-tags them.</p>
<h3>9.6 Aggregation & projection policies</h3>
<ul><li><b>Aggregation:</b> queries must return aggregates with a minimum group size (k-anonymity).</li><li><b>Projection:</b> a column may be usable in WHERE/JOIN but cannot be SELECTed directly.</li></ul>
<h3>9.7–9.9 Trust Center & encryption</h3>
<p><b>Trust Center:</b> Snowsight scanners — users without MFA, ACCOUNTADMIN membership, missing network policies, public shares — with remediation guidance. <b>Encryption:</b> AES-256 at rest by default, Snowflake-managed keys; Tri-Secret Secure (BC+) combines your KMS key with Snowflake's — neither alone can decrypt. Keys rotate automatically (annually on Ent+).</p>`,

10: `
<h3>10.1 Resource monitors</h3>
<pre>CREATE RESOURCE MONITOR finance_rm
  WITH CREDIT_QUOTA = 1000
  FREQUENCY = MONTHLY
  START_TIMESTAMP = IMMEDIATELY
  TRIGGERS
    ON 75 PERCENT DO NOTIFY
    ON 100 PERCENT DO SUSPEND
    ON 110 PERCENT DO SUSPEND_IMMEDIATE;
ALTER WAREHOUSE finance_wh
  SET RESOURCE_MONITOR = finance_rm;</pre>
<ul><li><b>NOTIFY:</b> notifies ACCOUNTADMINs (and configured users).</li><li><b>SUSPEND:</b> in-flight queries finish, then suspend.</li><li><b>SUSPEND_IMMEDIATE:</b> kills running queries instantly.</li></ul>
<p>Key facts: monitors are FREE; only ACCOUNTADMIN creates them by default; scope = warehouse(s) or whole account; only ACCOUNT-level monitors cover serverless (Snowpipe, MV maintenance, reclustering, replication); FREQUENCY = MONTHLY default, or DAILY / WEEKLY / YEARLY / NEVER.</p>
<h3>10.2 Credit math</h3>
<pre>M (4 cr/hr) × 15 min  = 1 credit
L (8 cr/hr) × 30 min  = 4 credits
XL (16 cr/hr) × 70 min ≈ 18.7 credits</pre>
<p>Dollar cost per credit varies by edition/region — roughly $2 Standard, $3 Enterprise, $4 Business Critical (illustrative).</p>
<h3>10.3 ACCOUNT_USAGE views to know</h3>
<table class="t"><tr><th>View</th><th>Purpose</th></tr>
<tr><td>QUERY_HISTORY</td><td>Every query — text, user, warehouse, duration</td></tr>
<tr><td>QUERY_ATTRIBUTION_HISTORY</td><td>Credits per query (chargeback)</td></tr>
<tr><td>WAREHOUSE_METERING_HISTORY</td><td>Per-warehouse credits over time</td></tr>
<tr><td>METERING_DAILY_HISTORY</td><td>Daily credits by service</td></tr>
<tr><td>STORAGE_USAGE</td><td>Daily storage incl. Fail-safe + stages</td></tr>
<tr><td>LOGIN_HISTORY</td><td>Every login attempt</td></tr>
<tr><td>ACCESS_HISTORY</td><td>Who accessed which columns/rows</td></tr>
<tr><td>COPY_HISTORY</td><td>Every COPY INTO load incl. Snowpipe</td></tr>
<tr><td>PIPE_USAGE_HISTORY</td><td>Snowpipe credits</td></tr></table>`,
11: `
<h3>11.1 Internal stages</h3>
<ul>
<li><b>User stage @~</b> — one per user, automatic, private:
<pre>PUT file:///local/data.csv @~/staging/;
LIST @~;</pre></li>
<li><b>Table stage @%tablename</b> — one per table, automatic; accessible to anyone with table privileges; CANNOT feed COPY INTO a different table.</li>
<li><b>Named stage</b> — explicit schema object, internal or external, most flexible — use for production:
<pre>CREATE STAGE my_stage FILE_FORMAT=(TYPE=CSV);</pre></li></ul>
<h3>11.2 External stages & storage integrations</h3>
<pre>CREATE STORAGE INTEGRATION s3_int
  TYPE = EXTERNAL_STAGE
  STORAGE_PROVIDER = 'S3'  ENABLED = TRUE
  STORAGE_AWS_ROLE_ARN = 'arn:aws:iam::123:role/sf'
  STORAGE_ALLOWED_LOCATIONS = ('s3://my-bucket/data/');

CREATE STAGE my_s3_stage
  STORAGE_INTEGRATION = s3_int
  URL = 's3://my-bucket/data/'
  FILE_FORMAT = my_csv_format;</pre>
<p>The integration trusts a cloud IAM role — users never see credentials.</p>
<h3>11.3 File formats</h3>
<pre>CREATE FILE FORMAT my_csv_format
  TYPE = CSV  FIELD_DELIMITER = ','
  SKIP_HEADER = 1
  FIELD_OPTIONALLY_ENCLOSED_BY = '"'
  NULL_IF = ('NULL','null','');</pre>
<p>Types: CSV, JSON, AVRO, ORC, PARQUET, XML.</p>
<h3>11.4 COPY INTO table</h3>
<pre>COPY INTO my_table
  FROM @my_stage/path/
  FILE_FORMAT=(FORMAT_NAME=my_csv_format)
  PATTERN='.*\\.csv'
  ON_ERROR='CONTINUE'  PURGE=TRUE;</pre>
<ul><li><b>ON_ERROR:</b> ABORT_STATEMENT (default), CONTINUE (skip bad rows), SKIP_FILE, SKIP_FILE_n% .</li><li><b>PURGE:</b> delete staged files after successful load. <b>FORCE:</b> reload already-loaded files.</li><li><b>VALIDATION_MODE:</b> RETURN_n_ROWS / RETURN_ERRORS / RETURN_ALL_ERRORS — validate without loading.</li></ul>
<h3>11.5 Directory tables</h3>
<pre>CREATE STAGE my_stage
  DIRECTORY=(ENABLE=TRUE) FILE_FORMAT=my_csv;
SELECT * FROM DIRECTORY(@my_stage);</pre>
<p>Queryable file catalog — path, size, last modified, MD5. AUTO_REFRESH=TRUE keeps it updated via cloud events.</p>
<h3>11.6 Unloading</h3>
<pre>COPY INTO @my_stage/export/
  FROM (SELECT * FROM orders WHERE region='EU')
  FILE_FORMAT=(TYPE=PARQUET)
  HEADER=TRUE  MAX_FILE_SIZE=268435456;</pre>
<p>SINGLE=TRUE for one file; MAX_FILE_SIZE up to 5 GB (default ~16 MB); HEADER for CSV. Unload formats: CSV, JSON, Parquet only.</p>
<h3>11.7 Load performance</h3>
<ul><li>Split large files into 100–250 MB compressed chunks for parallelism.</li><li>Parallel file slots scale with size: XS ≈ 8 files, S = 16, M = 32…</li><li>Prefer formats with predicate pushdown (Parquet); always use a storage integration.</li></ul>`,

12: `
<h3>12.1 Snowpipe (classic)</h3>
<pre>CREATE PIPE my_pipe AUTO_INGEST=TRUE AS
COPY INTO my_table
FROM @my_s3_stage/incoming/
FILE_FORMAT = my_csv_format;</pre>
<p><b>Triggers:</b> cloud event notifications (S3→SQS, Blob→Event Grid, GCS→Pub/Sub) — new file → notification → load, ~1 min latency; or the REST insertFiles API for explicit control.</p>
<p><b>Billing:</b> small per-file overhead + per-second serverless compute → ACCOUNT_USAGE.PIPE_USAGE_HISTORY.</p>
<p><b>Monitoring:</b></p>
<pre>SELECT SYSTEM$PIPE_STATUS('my_pipe');
SELECT * FROM TABLE(
  INFORMATION_SCHEMA.COPY_HISTORY(
    TABLE_NAME=>'my_table',
    START_TIME=>DATEADD(hour,-1,CURRENT_TIMESTAMP())));</pre>
<h3>12.2 Snowpipe Streaming</h3>
<p>No files — the app sends rows directly via the Streaming SDK. Row-level, sub-second latency, no per-file overhead, generally cheaper at high throughput.</p>
<div class="callout"><div class="ct">Addendum — two Streaming architectures</div>
<table class="t"><tr><th></th><th>Classic</th><th>High-Performance</th></tr>
<tr><td>SDKs</td><td>Java only</td><td>Java + Python (+ REST)</td></tr>
<tr><td>Target</td><td>Table directly</td><td>PIPE object → table</td></tr>
<tr><td>Validation</td><td>Client-side</td><td>Server-side (on pipe)</td></tr>
<tr><td>Transformations</td><td>No</td><td>Yes — COPY INTO syntax in the pipe</td></tr>
<tr><td>Billing</td><td>Serverless credits</td><td>Flat rate per uncompressed GB</td></tr>
<tr><td>Status</td><td>Deprecation planned</td><td>GA, recommended</td></tr></table>
<p>High-Performance extras: clustering keys / DEFAULT / AUTOINCREMENT supported on targets, up to 10 GB/s, ~5 s data freshness, and a default pipe auto-created per target table so you can stream without manual CREATE PIPE.</p></div>
<h3>12.3 Kafka Connector & choosing a tool</h3>
<table class="t"><tr><th>Tool</th><th>Trigger</th><th>Latency</th><th>Use when</th></tr>
<tr><td>COPY INTO</td><td>Manual/scheduled</td><td>On demand</td><td>Batch loads</td></tr>
<tr><td>Snowpipe</td><td>Cloud event / REST</td><td>~1 min</td><td>File-based continuous</td></tr>
<tr><td>Streaming</td><td>SDK row inserts</td><td>Sub-second</td><td>Row-level streaming</td></tr></table>
<p>Kafka Connector modes: Snowpipe (files → stage, simpler, higher latency) or Snowpipe Streaming (direct rows, lower latency, cheaper at scale; newer versions use the High-Performance architecture).</p>`,

13: `
<h3>13.1 Streams (CDC)</h3>
<pre>CREATE STREAM orders_stream ON TABLE orders;
SELECT * FROM orders_stream;      -- changes since last consume
INSERT INTO orders_archive
  SELECT * FROM orders_stream;    -- offset advances on COMMIT</pre>
<ul><li><b>STANDARD:</b> INSERT/UPDATE/DELETE with METADATA$ACTION, METADATA$ISUPDATE, METADATA$ROW_ID.</li><li><b>APPEND_ONLY:</b> inserts only — faster, less storage.</li><li><b>INSERT_ONLY:</b> external tables — tracks file additions.</li></ul>
<p><b>Staleness:</b> a stream is bound to the source's DATA_RETENTION_TIME_IN_DAYS; unconsumed past that window it goes stale and must be recreated. Extend via source retention or MAX_DATA_EXTENSION_TIME_IN_DAYS.</p>
<h3>13.2 Tasks</h3>
<pre>CREATE TASK my_task
  WAREHOUSE = etl_wh
  SCHEDULE = 'USING CRON 0 * * * * UTC'
AS INSERT INTO orders_archive
   SELECT * FROM orders_stream;
ALTER TASK my_task RESUME;</pre>
<ul><li>Schedules: CRON with timezone, or interval (SCHEDULE='5 MINUTE').</li><li><b>DAGs:</b> root task on a schedule; children declared AFTER parent, run on parent success.</li><li><b>Serverless:</b> omit WAREHOUSE and set USER_TASK_MANAGED_INITIAL_WAREHOUSE_SIZE — Snowflake supplies scaling compute.</li></ul>
<h3>13.3 Dynamic Tables</h3>
<pre>CREATE DYNAMIC TABLE orders_daily
  TARGET_LAG = '5 minutes'
  WAREHOUSE = etl_wh
AS SELECT region, COUNT(*), SUM(amount)
   FROM orders GROUP BY region;</pre>
<p>Snowflake detects source changes, computes incremental deltas where possible (full refresh fallback for unsupported SQL), and schedules refreshes to meet TARGET_LAG.</p>
<p><b>Choosing:</b> Dynamic Tables = declarative, joins supported, Snowflake-managed. Streams+Tasks = imperative, maximum flexibility. MVs = auto-maintained but restricted SQL (single base table).</p>`,

14: `
<h3>14.1–14.2 Drivers & connectors</h3>
<p>Drivers: JDBC, ODBC, .NET, Go, Node.js, PHP, Python. Connectors: Kafka (two modes), Spark (bidirectional), Hive Metastore.</p>
<h3>14.3 Integration objects</h3>
<p><b>Storage integration</b> — cloud storage without exposed credentials (see Day 11).</p>
<p><b>API integration</b> — lets External Functions call HTTPS endpoints:</p>
<pre>CREATE API INTEGRATION my_api
  API_PROVIDER = aws_api_gateway
  API_AWS_ROLE_ARN='arn:aws:iam::…:role/sf_api'
  API_ALLOWED_PREFIXES=('https://abc.execute-api.us-east-1.amazonaws.com/prod/');</pre>
<p><b>Notification integration</b> — Snowflake → SNS / Event Grid / Pub/Sub or email (alerts, Snowpipe error notifications).</p>
<p><b>Security integration</b> — OAuth, SAML, SCIM configuration.</p>
<p><b>Git integration:</b></p>
<pre>CREATE GIT REPOSITORY my_repo
  API_INTEGRATION = github_api
  ORIGIN='https://github.com/myorg/snowflake-objects';</pre>
<p>Mounts a repo as a stage — reference configs, Streamlit apps, Native App YAML directly; enables CI/CD.</p>
<h3>14.4 External Functions</h3>
<pre>CREATE EXTERNAL FUNCTION my_lambda(x VARIANT)
  RETURNS VARIANT
  API_INTEGRATION = my_api
  AS 'https://abc.execute-api…/my-lambda';</pre>
<p>Calls code outside Snowflake (Lambda, Azure Functions). Slower than Snowpark UDFs due to the HTTPS round trip — useful for third-party services you can't bring inside.</p>`,

16: `
<h3>16.1 The Query Profile</h3>
<p>Snowsight → Query History → click a query → Query Profile. Shows the plan as a graph with per-operator stats.</p>
<h3>16.2 What to look for</h3>
<ul>
<li><b>Partitions scanned vs total:</b> pruning ratio. Scanning most partitions on a filtered query = pruning failed — check for functions on the filter column, wrong clustering, or consider Search Optimization for point lookups.</li>
<li><b>Bytes scanned:</b> baseline — 100 GB scanned to return 100 rows means something is wrong.</li>
<li><b>Bytes spilled to local storage:</b> ran out of memory, used warehouse SSD. Tolerable; scale up.</li>
<li><b>Bytes spilled to remote storage:</b> exhausted SSD too, now using object storage — 10–100× slowdown. Almost always scale up significantly.</li>
<li><b>Exploding joins:</b> operator outputs far more rows than input — missing/wrong join keys, accidental cross-product. Look for huge intermediates.</li>
<li><b>Queueing:</b> waiting for capacity. High queueing = saturated → scale OUT.</li></ul>
<h3>16.3 Performance views</h3>
<ul><li><b>QUERY_HISTORY:</b> execution_time, bytes_spilled_*, partitions_scanned, percentage_scanned_from_cache.</li><li><b>QUERY_ATTRIBUTION_HISTORY:</b> credits per query — find the expensive ones.</li><li><b>ACCESS_HISTORY:</b> columns/rows accessed — governance + workload insight.</li></ul>
<h3>16.4 Workload grouping</h3>
<ul><li>ETL warehouse: large, nightly, auto-suspend ~5 min.</li><li>BI warehouse: medium, multi-cluster, ~10 min.</li><li>Ad-hoc: small, manual. Loading: small, COPY INTO only.</li><li>Never mix ETL with BI dashboards — different latency and concurrency needs.</li></ul>`,

17: `
<h3>17.1 Result Cache (Cloud Services)</h3>
<ul><li>Query results kept up to 24 hours; each reuse extends another 24 h, up to a 31-day hard limit.</li><li>Shared across the whole account (subject to privileges); returns in milliseconds, no warehouse needed.</li></ul>
<p><b>Invalidated by:</b> any DML on source tables; micro-partitions modified by reclustering; non-deterministic functions (CURRENT_TIMESTAMP, CURRENT_DATE, RANDOM, UUID_STRING); session variables affecting the result; querying role lacking visibility on a referenced object.</p>
<div class="callout"><div class="ct">Addendum — verified edge cases</div>
<ul><li>Whitespace/case differences in SQL prevent reuse (lower vs UPPER, added aliases).</li><li>Even COUNT (*) vs COUNT(*) can break reuse.</li><li>Schema changes (add/remove columns) invalidate even with unchanged data.</li><li>Reuse is never guaranteed even when all conditions hold — Snowflake decides.</li></ul></div>
<h3>17.2 Metadata Cache (Cloud Services)</h3>
<p>Persistent per-partition statistics. Some queries never need a warehouse: SELECT COUNT(*) FROM t; MIN/MAX on a column; DESCRIBE / SHOW. Milliseconds, no compute.</p>
<h3>17.3 Warehouse (local disk) cache</h3>
<ul><li>Per-warehouse SSD holding micro-partitions read from remote storage.</li><li>Persists while running; DROPPED on suspend and on resize; mostly retained when clusters are added.</li></ul>
<h3>17.4 Lookup order & implications</h3>
<pre>1. Result Cache     (Cloud Services)  ms
2. Metadata Cache   (Cloud Services)  ms
3. Warehouse Cache  (local SSD)       fast
4. Remote storage   (S3/Blob/GCS)     slowest</pre>
<ul><li>First query after resume = cold cache. Aggressive auto-suspend trades credits for cache warmth — tune per workload.</li><li>Identical dashboard queries across many users → result-cache magic, near-zero compute.</li><li>Modifying ANY row invalidates result cache for queries on that table.</li></ul>`,

18: `
<h3>18.1 The big picture</h3>
<table class="t"><tr><th>Feature</th><th>Problem</th><th>Edition</th><th>Cost model</th></tr>
<tr><td>Clustering key</td><td>Poor pruning on range/equality</td><td>All</td><td>Serverless reclustering</td></tr>
<tr><td>Materialized view</td><td>Repeated aggregations</td><td>Ent+</td><td>Storage + refresh</td></tr>
<tr><td>Search Optimization</td><td>Point/substring lookups</td><td>Ent+</td><td>Storage + maintenance</td></tr>
<tr><td>Query Acceleration</td><td>Outlier large queries</td><td>Ent+</td><td>Pay-per-use serverless</td></tr></table>
<h3>18.2 Clustering keys</h3>
<pre>ALTER TABLE orders CLUSTER BY (order_date, region);
SELECT SYSTEM$CLUSTERING_INFORMATION('orders');
SELECT SYSTEM$CLUSTERING_DEPTH('orders');</pre>
<p>Best: range filters on date/timestamp, selective equality on high-cardinality columns, tables &gt; ~1 TB. Not for: small tables, frequently-updated tables (constant reclustering is expensive), rarely-filtered columns.</p>
<h3>18.3 Materialized views</h3>
<pre>CREATE MATERIALIZED VIEW sales_daily AS
SELECT region, DATE(order_date) d, SUM(amount) tot
FROM orders GROUP BY region, DATE(order_date);</pre>
<p>Auto-refreshed serverlessly; matching queries on the base table are rewritten to use the MV automatically. Limits: single base table, no UDFs/window functions/ROLLUP/CUBE, limited aggregates.</p>
<h3>18.4 Search Optimization Service</h3>
<pre>ALTER TABLE customers ADD SEARCH OPTIMIZATION
  ON EQUALITY(email), SUBSTRING(name);</pre>
<p>Persistent search structure for point lookups, substring and geo queries on non-clustered columns — e.g. lookup by email where clustering would not help.</p>
<h3>18.5 Query Acceleration Service</h3>
<pre>ALTER WAREHOUSE my_wh SET
  ENABLE_QUERY_ACCELERATION = TRUE
  QUERY_ACCELERATION_MAX_SCALE_FACTOR = 8;</pre>
<p>Short-lived serverless compute for the expensive parts of outlier queries on a small warehouse. Pay only when used.</p>
<h3>18.6 Decision tree</h3>
<ul><li>Date-range filter, big table, poor pruning → CLUSTERING KEY</li><li>Point lookups on email/UUID → SEARCH OPTIMIZATION</li><li>Same aggregation thousands of times daily → MATERIALIZED VIEW</li><li>Mostly small queries + occasional monster → QUERY ACCELERATION</li><li>Remote-disk spilling → SCALE UP · Queueing → SCALE OUT</li></ul>`,

19: `
<h3>19.1 Time Travel</h3>
<pre>SELECT * FROM orders AT
 (TIMESTAMP=>'2025-01-15 10:00:00'::TIMESTAMP);
SELECT * FROM orders AT (OFFSET=>-3600);
SELECT * FROM orders BEFORE (STATEMENT=>'01a2…');
UNDROP TABLE orders;
UNDROP DATABASE my_db;
CREATE TABLE orders_restored
  CLONE orders AT (OFFSET=>-3600);</pre>
<table class="t"><tr><th>Table type</th><th>Standard</th><th>Enterprise+</th></tr>
<tr><td>Permanent</td><td>0–1 day (default 1)</td><td>0–90 days</td></tr>
<tr><td>Transient</td><td>0–1 day</td><td>0–1 day</td></tr>
<tr><td>Temporary</td><td>0–1 day (session)</td><td>0–1 day (session)</td></tr></table>
<div class="callout"><div class="ct">Addendum — retention inheritance</div><p>On Ent+, retention can be set on databases, schemas OR tables; children inherit from the parent unless explicitly overridden — and the explicit setting on an object wins for that object.</p>
<pre>CREATE DATABASE my_db DATA_RETENTION_TIME_IN_DAYS=30;
CREATE TABLE my_db.public.t DATA_RETENTION_TIME_IN_DAYS=7;</pre></div>
<h3>19.2 Fail-safe</h3>
<pre>Day 0        table dropped
Day 0–1/90   Time Travel — UNDROP, AT/BEFORE
Day +7       Fail-safe — Snowflake support only
After        gone forever</pre>
<p>7 days fixed, permanent tables only, not user-queryable, cannot be disabled or configured. Storage cost shows in STORAGE_USAGE. CDP = Time Travel + Fail-safe + always-on encryption + RBAC.</p>
<h3>19.3 Zero-copy cloning</h3>
<pre>CREATE TABLE orders_dev CLONE orders;
CREATE DATABASE my_db_clone CLONE my_db;
CREATE TABLE orders_yday
  CLONE orders AT (OFFSET=>-86400);</pre>
<p>Metadata-only; clone shares partitions with the source; copy-on-write means storage grows only with divergence. Cloned: tables, views, schemas, databases, stages, file formats, sequences, streams, tasks. NOT cloned by default: internal stage files, pipes, load history. External tables clone but point at the same external location.</p>
<h3>19.4 Secure Data Sharing</h3>
<pre>-- provider
CREATE SHARE customer_share;
GRANT USAGE ON DATABASE shared_db TO SHARE customer_share;
GRANT SELECT ON ALL TABLES IN SCHEMA shared_db.public
  TO SHARE customer_share;
ALTER SHARE customer_share ADD ACCOUNTS=org.acct;
-- consumer
CREATE DATABASE customer_data
  FROM SHARE org.acct.customer_share;</pre>
<p>Zero copy — consumer reads provider data directly. Provider pays storage, consumer pays compute. Same region only (cross-region needs replication first). Consumer is read-only; resharing possible with restrictions.</p>
<h3>19.5–19.9 Reader accounts, Marketplace & more</h3>
<ul>
<li><b>Reader accounts:</b> for consumers without Snowflake — provider creates, manages and pays for everything; default limit 1 (request more).</li>
<li><b>Marketplace:</b> public listings (discoverable, free or paid — Snowflake handles billing) or private listings (invite-only B2B).</li>
<li><b>Data Clean Rooms:</b> multi-party analytics on combined data with pre-approved queries; nobody sees raw records.</li>
<li><b>Native Apps:</b> full applications distributed via Marketplace, running inside the CONSUMER's account — data never leaves.</li>
<li><b>Replication (Ent+):</b> async database replication cross-region/cloud. <b>Failover/failback (BC+):</b> promote a replica for DR.</li></ul>`

/* =============== STATE & STORAGE =============== */
let S = { scores:{}, missed:{}, done:{} };   // scores[day]=[{d,s,t}], missed[qid]=day, done[day]=true
let storageOK = false;

const KEY = "snowpro-cof-c03-state";
async function loadState(){
  try{
    if(window.storage){            // running as a Claude artifact
      try{ const r = await window.storage.get(KEY);
           if(r && r.value) S = Object.assign(S, JSON.parse(r.value)); }catch(e){}
      storageOK = true;
    } else if(typeof localStorage !== "undefined"){   // standalone in a browser
      const v = localStorage.getItem(KEY);
      if(v) S = Object.assign(S, JSON.parse(v));
      storageOK = true;
    }
  }catch(e){ /* private browsing etc. — run in-memory */ }
}
async function saveState(){
  const v = JSON.stringify(S);
  try{
    if(window.storage){ await window.storage.set(KEY, v); }
    else if(typeof localStorage !== "undefined"){ localStorage.setItem(KEY, v); }
  }catch(e){ console.error("save failed", e); }
}

/* =============== HELPERS =============== */
const $ = s=>document.querySelector(s);
const app = document.getElementById("app");
const dayByN = n => DAYS.find(d=>d.n===n);
const esc = t=>t; // content is trusted local data

function bestPct(n){
  const a = S.scores[n]; if(!a || !a.length) return null;
  return Math.max(...a.map(x=>Math.round(100*x.s/x.t)));
}
function scoreClass(p){ return p>=80 ? "good" : p>=60 ? "mid" : "low"; }
function scoreColor(p){ return p>=80 ? "var(--melt)" : p>=60 ? "var(--amber)" : "var(--coral)"; }
function missedList(){
  const out=[];
  for(const qid in S.missed){
    const dn = S.missed[qid];
    const day = dayByN(dn); if(!day || !day.quiz) continue;
    const q = day.quiz.find(x=>x.id===qid);
    if(q) out.push(Object.assign({day:dn}, q));
  }
  return out;
}

/* =============== HOME =============== */
function renderHome(){
  let cells = "";
  for(const d of DAYS){
    const p = bestPct(d.n);
    let fill = "";
    if(d.type && S.done[d.n]) fill = '<div class="fill" style="height:100%;background:rgba(91,208,232,.35)"></div>';
    else if(p!==null) fill = '<div class="fill" style="height:'+Math.max(p,12)+'%;background:'+scoreColor(p)+'"></div>';
    cells += '<button class="cell" onclick="openDay('+d.n+')">'+fill+'<span class="mono">'+d.n+'</span></button>';
  }
  const doneCount = DAYS.filter(d=> (d.type && S.done[d.n]) || bestPct(d.n)!==null ).length;

  const phases = [[1,"Phase 1 · Architecture"],[2,"Phase 2 · Security & Governance"],[3,"Phase 3 · Loading & Connectivity"],[4,"Phase 4 · Performance"],[5,"Phase 5 · Collaboration"]];
  let list = "";
  const special = {15:"Practice Exam #1", 20:"Weak-Spot Review", 21:"Practice Exam #2"};
  const order = DAYS.slice().sort((a,b)=>a.n-b.n);
  let lastHeader = "";
  for(const d of order){
    let header = d.type ? "Milestones" : (phases.find(p=>p[0]===d.phase)||[])[1];
    if(d.n===15) header = "Milestone · Day 15";
    if(d.n===20) header = "Final stretch";
    if(d.n===21) header = "";
    if(d.phase>0){ header = (phases.find(p=>p[0]===d.phase))[1]; }
    if(header && header!==lastHeader){ list += '<div class="phase">'+header+'</div>'; lastHeader = header; }
    const p = bestPct(d.n);
    let badge;
    if(d.type){ badge = S.done[d.n] ? '<span class="badge b-done">Done</span>' : '<span class="badge b-none">To do</span>'; }
    else if(p===null){ badge = '<span class="badge b-none">—</span>'; }
    else { badge = '<span class="badge b-'+scoreClass(p)+'">'+p+'%</span>'; }
    list += '<button class="dayrow" onclick="openDay('+d.n+')">'+
      '<span class="dnum mono">'+String(d.n).padStart(2,"0")+'</span>'+
      '<span style="flex:1"><span class="dtitle">'+d.title+'</span><br><span class="dmeta">'+d.domain+'</span></span>'+badge+'</button>';
  }

  app.innerHTML =
    '<div class="top"><h1>SnowPro Core Trainer</h1><span class="code mono">COF-C03</span></div>'+
    '<div class="sub">21 days · read → quiz → flashcards · scores saved per day</div>'+
    '<div class="strip">'+cells+'</div>'+
    '<div class="striplabel"><b>'+doneCount+'</b> of 21 partitions filled · green ≥ 80% · redo anything amber or red</div>'+
    list+
    '<div class="homebtns">'+
      '<button class="ghost" onclick="renderCheat()">Cheat sheet</button>'+
      '<button class="ghost" onclick="renderBackup()">Backup / sync</button>'+
      '<button class="ghost" onclick="resetAll()">Reset</button>'+
    '</div>'+
    (storageOK ? '' : '<div class="notice">Storage unavailable (private browsing?) — progress will not persist after closing.</div>');
  window.scrollTo(0,0);
}

async function resetAll(){
  if(!confirm("Clear all scores, missed questions and checkmarks?")) return;
  S = {scores:{}, missed:{}, done:{}};
  await saveState(); renderHome();
}

/* =============== DAY SCREEN =============== */
let cur = null; // {n, tab}
function openDay(n, tab){
  const d = dayByN(n);
  cur = {n:n, tab: tab || (d.type ? "spec" : "study")};
  renderDay();
}
function renderDay(){
  const d = dayByN(cur.n);
  let head = '<button class="back" onclick="renderHome()">‹ All days</button>'+
    '<div class="dayhead"><div class="eyebrow mono">DAY '+String(d.n).padStart(2,"0")+'</div>'+
    '<h2>'+d.title+'</h2><div class="domain">'+d.domain+'</div></div>';

  if(d.type){ app.innerHTML = head + renderSpecial(d); window.scrollTo(0,0); return; }

  const tabs = [["study","Study"],["cards","Cards"],["quiz","Quiz"]];
  let tabbar = '<div class="tabs">'+tabs.map(t=>
    '<button class="tab'+(cur.tab===t[0]?" on":"")+'" onclick="switchTab(\''+t[0]+'\')">'+t[1]+'</button>').join("")+'</div>';

  let body = "";
  if(cur.tab==="study") body = renderStudy(d);
  else if(cur.tab==="cards") body = ""; // rendered after
  else body = ""; // quiz rendered after

  app.innerHTML = head + tabbar + '<div id="body">'+body+'</div>';
  if(cur.tab==="cards") startCards(d);
  if(cur.tab==="quiz") startQuiz(d.quiz, d.n, false);
  window.scrollTo(0,0);
}
function switchTab(t){ cur.tab = t; renderDay(); }

function renderStudy(d){
  let html = '<div class="keybox"><div class="ct">Key points — recall these cold</div>'+
    '<ul class="study">'+d.study.map(s=>"<li>"+s+"</li>").join("")+'</ul></div>';
  if(typeof MATERIAL!=="undefined" && MATERIAL[d.n]) html += '<div class="material">'+MATERIAL[d.n]+'</div>';
  if(d.addendum){
    html += '<div class="callout"><div class="ct">'+d.addendum.title+'</div><ul>'+
      d.addendum.items.map(i=>"<li>"+i+"</li>").join("")+'</ul></div>';
  }
  html += '<button class="primary" onclick="switchTab(\'cards\')">Continue to flashcards</button>';
  return html;
}

/* =============== SPECIAL DAYS =============== */
function renderSpecial(d){
  const sp = d.spec;
  let steps = '<ul>'+sp.steps.map(s=>"<li>"+s+"</li>").join("")+'</ul>';
  let extra = "";
  if(d.type==="review"){
    const miss = missedList();
    if(miss.length){
      extra = '<h3>Your missed questions ('+miss.length+')</h3>'+
        '<p>Collected automatically from every quiz attempt. Clear them all to finish Day 20.</p>'+
        '<button class="primary" onclick="startWeakQuiz()">Redo missed questions</button>';
    } else {
      extra = '<h3>Your missed questions</h3><p>Nothing in the weak list right now — either you have not taken the quizzes yet, or you have cleared them all. Re-skim the checklist above instead.</p>';
    }
  }
  const on = S.done[d.n] ? " on" : "";
  const tickmark = S.done[d.n] ? "✓" : "";
  return '<div class="spec"><p>'+sp.intro+'</p>'+steps+
    '<p style="color:var(--mist);font-size:.82rem">'+sp.score+'</p>'+extra+
    '<button class="toggle'+on+'" onclick="toggleDone('+d.n+')"><span class="tick">'+tickmark+'</span> Mark Day '+d.n+' complete</button></div>';
}
async function toggleDone(n){
  S.done[n] = !S.done[n]; if(!S.done[n]) delete S.done[n];
  await saveState(); renderDay();
}
function startWeakQuiz(){
  const miss = missedList();
  app.innerHTML = '<button class="back" onclick="openDay(20)">‹ Day 20</button>'+
    '<div class="dayhead"><div class="eyebrow mono">WEAK-SPOT REVIEW</div><h2>Missed questions</h2>'+
    '<div class="domain">Answer correctly to clear each one from the list</div></div><div id="body"></div>';
  startQuiz(miss, null, true);
}

/* =============== FLASHCARDS =============== */
let C = null;
function startCards(d){
  C = { deck: d.cards.slice(), i:0, flipped:false, missPile:[], got:0, total:d.cards.length, round:1 };
  drawCard();
}
function drawCard(){
  const b = $("#body");
  if(C.i >= C.deck.length){
    if(C.missPile.length){
      C.deck = C.missPile; C.missPile = []; C.i = 0; C.flipped=false; C.round++;
      b.innerHTML = '<div class="result"><div class="big" style="font-size:1.6rem">Round '+C.round+'</div>'+
        '<div class="msg">'+C.deck.length+' card'+(C.deck.length>1?"s":"")+' you missed — again until they stick.</div>'+
        '<button class="primary" onclick="drawCard()">Go</button></div>';
      return;
    }
    b.innerHTML = '<div class="result"><div class="big">✓</div>'+
      '<div class="msg">All '+C.total+' cards recalled. Now take the quiz.</div>'+
      '<button class="primary" onclick="switchTab(\'quiz\')">Start quiz</button></div>';
    return;
  }
  const c = C.deck[C.i];
  b.innerHTML =
    '<div class="prog"><span>Card '+(C.i+1)+' / '+C.deck.length+(C.round>1?" · round "+C.round:"")+'</span><span>tap card to flip</span></div>'+
    '<div class="cardwrap"><div class="fcard'+(C.flipped?" flip":"")+'" onclick="flipCard()">'+
      '<div class="face"><span class="lbl mono">Q</span>'+c.q+'<span class="tap">tap to reveal</span></div>'+
      '<div class="face back"><span class="lbl mono">A</span>'+c.a+'</div>'+
    '</div></div>'+
    '<div class="cardbtns">'+
      '<button class="cbtn miss" onclick="markCard(false)">Missed it</button>'+
      '<button class="cbtn got" onclick="markCard(true)">Got it</button>'+
    '</div>';
}
function flipCard(){ C.flipped = !C.flipped; document.querySelector(".fcard").classList.toggle("flip", C.flipped); }
function markCard(got){
  if(!got) C.missPile.push(C.deck[C.i]);
  C.i++; C.flipped=false; drawCard();
}

/* =============== QUIZ =============== */
let Q = null;
function startQuiz(questions, dayN, weakMode){
  if(!questions || !questions.length){ $("#body").innerHTML = '<p style="color:var(--mist)">No questions for this day.</p>'; return; }
  Q = { qs: questions, i:0, sel:new Set(), checked:false, score:0, dayN:dayN, weak:weakMode };
  drawQ();
}
function drawQ(){
  const b = $("#body");
  if(Q.i >= Q.qs.length){ finishQuiz(); return; }
  const q = Q.qs[Q.i];
  const multi = q.ans.length>1;
  let opts = q.opts.map((o,idx)=>{
    let cls = "opt";
    if(Q.checked){
      if(q.ans.includes(idx)) cls += " right";
      else if(Q.sel.has(idx)) cls += " wrong";
    } else if(Q.sel.has(idx)) cls += " sel";
    return '<button class="'+cls+'" onclick="pick('+idx+')"><span class="key mono">'+"ABCD"[idx]+'</span><span>'+o+'</span></button>';
  }).join("");
  let verdict = "";
  if(Q.checked){
    const ok = sameSet(Q.sel, q.ans);
    verdict = '<div class="verdict '+(ok?"ok":"no")+'">'+(ok?"Correct":"Not quite — correct: "+q.ans.map(a=>"ABCD"[a]).join(", "))+'</div>';
    if(q.note) verdict += '<div style="font-size:.8rem;color:var(--mist);margin-bottom:6px">'+q.note+'</div>';
  }
  b.innerHTML =
    '<div class="prog"><span>Question '+(Q.i+1)+' / '+Q.qs.length+(Q.weak?' · from Day '+q.day:'')+'</span><span>Score '+Q.score+'</span></div>'+
    '<div class="qtext">'+q.q+'</div>'+
    (multi ? '<div class="qnote">Choose '+["","","two","three"][q.ans.length]+'</div>' : '')+
    opts + verdict +
    '<button class="primary" '+(!Q.checked && Q.sel.size===0 ? "disabled":"")+' onclick="'+(Q.checked?"nextQ()":"checkQ()")+'">'+
      (Q.checked ? (Q.i+1<Q.qs.length ? "Next question" : "See result") : "Check answer")+'</button>';
}
function pick(idx){
  if(Q.checked) return;
  const q = Q.qs[Q.i];
  const multi = q.ans.length>1;
  if(multi){ Q.sel.has(idx) ? Q.sel.delete(idx) : Q.sel.add(idx); }
  else { Q.sel = new Set([idx]); }
  drawQ();
}
function sameSet(sel, ans){
  if(sel.size !== ans.length) return false;
  for(const a of ans) if(!sel.has(a)) return false;
  return true;
}
async function checkQ(){
  const q = Q.qs[Q.i];
  const ok = sameSet(Q.sel, q.ans);
  if(ok){
    Q.score++;
    if(S.missed[q.id]){ delete S.missed[q.id]; await saveState(); }
  } else {
    S.missed[q.id] = Q.weak ? q.day : Q.dayN;
    await saveState();
  }
  Q.checked = true; drawQ();
}
function nextQ(){ Q.i++; Q.sel = new Set(); Q.checked=false; drawQ(); }

async function finishQuiz(){
  const pct = Math.round(100*Q.score/Q.qs.length);
  let msg, save = "";
  if(Q.weak){
    const left = missedList().length;
    msg = left===0 ? "Weak list cleared. That was the point of Day 20." : left+" question"+(left>1?"s":"")+" still on the weak list — run it again.";
  } else {
    if(!S.scores[Q.dayN]) S.scores[Q.dayN] = [];
    S.scores[Q.dayN].push({d:new Date().toISOString().slice(0,10), s:Q.score, t:Q.qs.length});
    await saveState();
    msg = pct>=80 ? "Solid — this day is green. Move on." :
          pct>=60 ? "Close. Re-read the study notes, then retake to turn this green." :
          "Below the bar — redo the study tab and flashcards before retaking.";
  }
  const atts = (!Q.weak && S.scores[Q.dayN]) ?
    '<div class="attempts"><h4>Attempts</h4>'+S.scores[Q.dayN].slice().reverse().map(a=>
      '<div class="att"><span>'+a.d+'</span><b>'+a.s+' / '+a.t+' · '+Math.round(100*a.s/a.t)+'%</b></div>').join("")+'</div>' : "";
  $("#body").innerHTML =
    '<div class="result"><div class="big" style="color:'+scoreColor(pct)+'">'+pct+'%</div>'+
    '<div class="of">'+Q.score+' of '+Q.qs.length+' correct</div>'+
    '<div class="msg">'+msg+'</div>'+
    '<button class="primary" onclick="'+(Q.weak?"startWeakQuiz()":"switchTab(\'quiz\')")+'">Retake</button>'+
    '<button class="ghost" style="width:100%;margin-top:8px" onclick="'+(Q.weak?"openDay(20)":"renderHome()")+'">'+(Q.weak?"Back to Day 20":"Back to all days")+'</button>'+
    atts+'</div>';
}

/* =============== BACKUP / SYNC =============== */
function renderBackup(){
  app.innerHTML = '<button class="back" onclick="renderHome()">‹ All days</button>'+
    '<div class="dayhead"><div class="eyebrow mono">BACKUP / SYNC</div><h2>Move progress between devices</h2>'+
    '<div class="domain">Progress is saved on this device. To sync: copy the code below on one device, paste it here on the other, then Load.</div></div>'+
    '<textarea class="backuparea" id="bk">'+JSON.stringify(S)+'</textarea>'+
    '<button class="primary" onclick="copyBackup()">Copy code</button>'+
    '<button class="primary" style="background:var(--frost2);color:var(--ice);margin-top:8px" onclick="loadBackup()">Load pasted code</button>'+
    '<div class="notice">Tip: message the code to yourself, then open this page on the other device and paste it in.</div>';
  window.scrollTo(0,0);
}
function copyBackup(){
  const t = document.getElementById("bk");
  t.select(); t.setSelectionRange(0, 999999);
  try{ navigator.clipboard.writeText(t.value); alert("Copied. Paste it into Backup / sync on your other device."); }
  catch(e){ document.execCommand("copy"); alert("Copied."); }
}
async function loadBackup(){
  try{
    const v = JSON.parse(document.getElementById("bk").value);
    if(typeof v !== "object" || !("scores" in v)) throw new Error("bad shape");
    S = Object.assign({scores:{},missed:{},done:{}}, v);
    await saveState();
    alert("Progress loaded.");
    renderHome();
  }catch(e){ alert("That code could not be read — paste the exact code copied from the other device."); }
}

/* =============== CHEAT SHEET =============== */
function renderCheat(){
  let html = '<button class="back" onclick="renderHome()">‹ All days</button>'+
    '<div class="dayhead"><div class="eyebrow mono">EXAM MORNING</div><h2>High-yield cheat sheet</h2>'+
    '<div class="domain">Skim once before you walk in</div></div><div class="cheat">';
  for(const s of CHEAT){
    html += '<h3>'+s.h+'</h3><ul>'+s.items.map(i=>"<li>"+i+"</li>").join("")+'</ul>';
  }
  html += '</div>';
  app.innerHTML = html; window.scrollTo(0,0);
}

/* =============== BOOT =============== */
(async function(){
  await loadState();
  renderHome();
})();
</script>
